<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals Gallery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-camera-retro"></i>
        <h2>PIXEL GALLERY</h2>
    </div>

    <div class="count">2 Photos</div>

</header>

<section class="hero">

    <h1>Animals Gallery</h1>

    <p>Discover beautiful animals from around the world.</p>

    <div class="search-filter">

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search Animal Photos...">
        </div>

        <div class="filters">

            <a href="index.html"><button>All</button></a>

            <a href="nature.html"><button>Nature</button></a>

            <a href="landmark.html"><button>Landmark</button></a>

            <a href="animals.html"><button class="active">Animals</button></a>

            <a href="mountains.html"><button>Mountains</button></a>

        </div>

    </div>

</section>

<section class="gallery">

    <div class="card">
        <img src="animal1.jfif" alt="Animal 1">
    </div>

    <div class="card">
        <img src="images.animal2.jfif" alt="Animal 2">
    </div>

</section>

</body>
</html>
